# ============================================
#  Kitty — macOS Ventura Dark Theme
#  Matches the waybar/wofi/dunst setup
# ============================================


# ── Fonts ────────────────────────────────────
font_family                JetBrainsMono Nerd Font
bold_font                  JetBrainsMono Nerd Font Bold
italic_font                JetBrainsMono Nerd Font Italic
bold_italic_font           JetBrainsMono Nerd Font Bold Italic

# Fallbacks if JetBrains isn't installed:
# font_family              FiraCode Nerd Font
# font_family              Hack Nerd Font

font_size                  13.0
force_ltr                  no

# Ligatures (set to 0 to disable)
font_features              JetBrainsMonoNFM-Regular    +liga +calt
font_features              JetBrainsMonoNFM-Bold       +liga +calt
font_features              JetBrainsMonoNFM-Italic     +liga +calt
font_features              JetBrainsMonoNFM-BoldItalic +liga +calt

modify_font cell_height    2px


# ── Cursor ───────────────────────────────────
cursor                     #0A84FF
cursor_text_color          #1c1c1e
cursor_shape               beam
cursor_beam_thickness      2.0
cursor_blink_interval      0.6
cursor_stop_blinking_after 10.0


# ── Scrollback ───────────────────────────────
scrollback_lines           10000
scrollback_pager           less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
wheel_scroll_multiplier    3.0
touch_scroll_multiplier    1.0


# ── Mouse ────────────────────────────────────
mouse_hide_wait            2.0
url_color                  #0A84FF
url_style                  curly
open_url_with              default
url_prefixes               file ftp ftps http https mailto
detect_urls                yes
copy_on_select             no
focus_follows_mouse        no


# ── Performance ──────────────────────────────
repaint_delay              8
input_delay                2
sync_to_monitor            yes


# ── Terminal bell ─────────────────────────────
enable_audio_bell          no
visual_bell_duration       0.0
visual_bell_color          #3a3a3c
window_alert_on_bell       yes
bell_on_tab                "🔔 "


# ── Window layout ────────────────────────────
remember_window_size       yes
initial_window_width       920
initial_window_height      580

# macOS-style padding inside the window
window_padding_width       16 20

# Rounded corners require a compositor (Hyprland handles this)
# via windowrulev2 — see bottom of this file

hide_window_decorations    yes
confirm_os_window_close    0


# ── Transparency & blur ───────────────────────
# Set to 1.0 to disable; use Hyprland windowrule for blur
background_opacity         0.88
background_blur            1
dynamic_background_color   no


# ── Tab bar ──────────────────────────────────
tab_bar_edge               bottom
tab_bar_style              powerline
tab_powerline_style        slanted
tab_bar_min_tabs           2
tab_bar_align              left
tab_bar_margin_width       4.0
tab_bar_margin_height      4.0 4.0

tab_title_template         "{fmt.fg._7d7d7d}{index}:{fmt.fg.tab} {title}"
active_tab_title_template  "{fmt.fg._0A84FF}󰮯 {fmt.fg.tab}{title}"

active_tab_font_style      bold
inactive_tab_font_style    normal

tab_bar_background         #161618
tab_fade                   0.25 0.5 0.75 1


# ── Color scheme — macOS Ventura Dark ────────
foreground                 #e8e8e8
background                 #1c1c1e
selection_foreground       #e8e8e8
selection_background       #0A84FF

# Black
color0                     #3a3a3c
color8                     #636366

# Red
color1                     #FF453A
color9                     #FF6961

# Green
color2                     #30D158
color10                    #34C759

# Yellow
color3                     #FF9F0A
color11                    #FFD60A

# Blue
color4                     #0A84FF
color12                    #409CFF

# Magenta / Purple
color5                     #BF5AF2
color13                    #DA8FFF

# Cyan
color6                     #5AC8FA
color14                    #70D7FF

# White
color7                     #ebebeb
color15                    #ffffff


# ── Marks ────────────────────────────────────
mark1_foreground           #1c1c1e
mark1_background           #0A84FF
mark2_foreground           #1c1c1e
mark2_background           #BF5AF2
mark3_foreground           #1c1c1e
mark3_background           #30D158


# ── Keyboard shortcuts ────────────────────────
kitty_mod                  ctrl+shift

# Clipboard
map kitty_mod+c            copy_to_clipboard
map kitty_mod+v            paste_from_clipboard

# Font size
map kitty_mod+equal        change_font_size all +1.0
map kitty_mod+minus        change_font_size all -1.0
map kitty_mod+0            change_font_size all 0

# Tabs
map kitty_mod+t            new_tab_with_cwd
map kitty_mod+w            close_tab
map kitty_mod+right        next_tab
map kitty_mod+left         previous_tab
map kitty_mod+1            goto_tab 1
map kitty_mod+2            goto_tab 2
map kitty_mod+3            goto_tab 3
map kitty_mod+4            goto_tab 4
map kitty_mod+5            goto_tab 5

# Splits (windows)
map kitty_mod+enter        new_window_with_cwd
map kitty_mod+d            close_window
map kitty_mod+]            next_window
map kitty_mod+[            previous_window
map kitty_mod+f5           launch --location=hsplit --cwd=current
map kitty_mod+f6           launch --location=vsplit --cwd=current

# Scrollback
map kitty_mod+up           scroll_line_up
map kitty_mod+down         scroll_line_down
map kitty_mod+page_up      scroll_page_up
map kitty_mod+page_down    scroll_page_down
map kitty_mod+home         scroll_home
map kitty_mod+end          scroll_end

# Misc
map kitty_mod+f11          toggle_fullscreen
map kitty_mod+u            kitten unicode_input
map kitty_mod+escape       kitty_shell window


# ── Shell integration ─────────────────────────
shell_integration          enabled
allow_hyperlinks           yes
shell /usr/bin/fish

# ── Misc ─────────────────────────────────────
term                       xterm-kitty
close_on_child_death       no
update_check_interval      0


# ============================================
# Hyprland window rules (add to hyprland.conf)
# ============================================
# windowrulev2 = opacity 0.88 0.88, class:^(kitty)$
# windowrulev2 = rounding 12, class:^(kitty)$
# windowrulev2 = blur, class:^(kitty)$
