# ============================================
#  Hyprland — macOS Ventura Dark Theme
#  Matches waybar / wofi / dunst / kitty setup
# ============================================


################
### MONITORS ###
################

monitor = eDP-1, 1920x1080, 0x0, 1, vrr, 1


###################
### MY PROGRAMS ###
###################

$terminal    = kitty
$fileManager = dolphin
$menu        = wofi --show drun
$browser     = flatpak run app.zen_browser.zen
$lock        = hyprlock


#################
### AUTOSTART ###
#################

exec-once = dunst
exec-once = waybar
exec-once = hyprpaper
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in           = 6
    gaps_out          = 14
    border_size       = 1
    resize_on_border  = true
    allow_tearing     = false
    layout            = dwindle

    # macOS: subtle single-color border, blue on focus
    col.active_border   = rgba(0A84FFcc)
    col.inactive_border = rgba(3a3a3c55)
}

decoration {
    rounding       = 12
    rounding_power = 2

    active_opacity   = 1.0
    inactive_opacity = 0.96
    fullscreen_opacity = 1.0

    # macOS-style drop shadow
    shadow {
        enabled      = true
        range        = 30
        render_power = 4
        offset       = 0, 8
        color        = rgba(00000066)
        color_inactive = rgba(00000033)
    }

    blur {
        enabled          = true
        size             = 10
        passes           = 3
        noise            = 0.02
        contrast         = 1.0
        brightness       = 1.0
        vibrancy         = 0.25
        vibrancy_darkness = 0.5
        special          = true
        popups           = true
    }
}

animations {
    enabled = true

    # macOS-like spring curves
    bezier = macSwift,    0.25, 0.46, 0.45, 1.0
    bezier = macSnappy,   0.23, 1,    0.32, 1
    bezier = macBounce,   0.34, 1.56, 0.64, 1
    bezier = linear,      0,    0,    1,    1
    bezier = fadeEase,    0.4,  0,    0.2,  1

    # Windows — smooth slide+fade like macOS Mission Control
    animation = windows,    1, 4,   macSnappy
    animation = windowsIn,  1, 4,   macSnappy,  slide
    animation = windowsOut, 1, 2.5, macSwift,   slide
    animation = windowsMove,1, 3,   macSnappy

    # Fades
    animation = fadeIn,     1, 3,   fadeEase
    animation = fadeOut,    1, 2,   fadeEase
    animation = fade,       1, 3,   fadeEase
    animation = fadeDim,    1, 3,   fadeEase

    # Layers (waybar, wofi, dunst)
    animation = layers,        1, 3,   macSnappy
    animation = layersIn,      1, 3,   macSnappy,  fade
    animation = layersOut,     1, 2,   macSwift,   fade
    animation = fadeLayersIn,  1, 2,   fadeEase
    animation = fadeLayersOut, 1, 1.5, fadeEase

    # Workspaces — macOS Spaces swipe feel
    animation = workspaces,    1, 4,   macSwift,   slidefade 20%
    animation = workspacesIn,  1, 4,   macSnappy,  slidefade 20%
    animation = workspacesOut, 1, 3,   macSwift,   slidefade 20%

    animation = specialWorkspace, 1, 4, macBounce, slidevert
}

dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = true)
    smart_resizing = true
}

master {
    new_status = slave
    mfact      = 0.55
}

misc {
    vfr                         = true
    vrr                         = 1
    disable_hyprland_logo       = false
    disable_splash_rendering    = true
    focus_on_activate           = true
    mouse_move_enables_dpms     = true
    key_press_enables_dpms      = true
    animate_manual_resizes      = true
    animate_mouse_windowdragging = true
}


#############
### INPUT ###
#############

input {
    kb_layout  = en_azerty
    follow_mouse = 1
    accel_profile = flat
    sensitivity   = 0

    touchpad {
        natural_scroll    = false
        tap-to-click      = true
        drag_lock         = true
        disable_while_typing = false
    }
}

gesture = 3, horizontal, workspace
gesture = 3, pinchout, close
gesture = 3, up, fullscreen
gesture = 3, down, fullscreen

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
##############################
### LAYER RULES (blur etc) ###
##############################
 
# Waybar — frosted glass
layerrule {
    name = waybar-blur
    match:namespace = waybar
    blur            = true
}
 
# Wofi — Spotlight blur
layerrule {
    name = wofi-blur
    match:namespace = wofi
    blur            = true
}
 
# Dunst — notification blur
layerrule {
    name = dunst-blur
    match:namespace = dunst
    blur            = true
}


##############################
### WINDOW RULES           ###
##############################

# Global — suppress maximize
windowrule {
    name      = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# Fix XWayland drag
windowrule {
    name           = fix-xwayland-drags
    match:class    = ^$
    match:title    = ^$
    match:xwayland = true
    match:float    = true
    match:fullscreen = false
    match:pin      = false
    no_focus = true
}

# Kitty — translucent + blur
windowrule {
    name        = kitty-style
    match:class = ^(kitty)$
    opacity     = 0.88 0.82
    rounding    = 12
}

# Wofi — center float
windowrule {
    name        = wofi-center
    match:class = ^(wofi)$
    float       = true
    center      = true
    rounding    = 14
}

# Dolphin
windowrule {
    name        = dolphin-style
    match:class = ^(dolphin)$
    rounding    = 12
    opacity     = 0.95 0.90
}

# Firefox / Zen browser
windowrule {
    name        = browser-style
    match:class = ^(firefox|zen-browser|zen|Navigator)$
    rounding    = 12
}

# pavucontrol — small float
windowrule {
    name        = pavucontrol-float
    match:class = ^(pavucontrol)$
    float       = true
    size        = 700 450
    center      = true
    rounding    = 12
}

# nm-connection-editor
windowrule {
    name        = nm-float
    match:class = ^(nm-connection-editor)$
    float       = true
    center      = true
    rounding    = 12
}

# Picture-in-picture
windowrule {
    name        = pip
    match:title = ^(Picture-in-Picture)$
    float       = true
    pin         = true
    size        = 400 225
    move        = 100%-420 100%-245
}

# hyprland-run scratchpad
windowrule {
    name        = move-hyprland-run
    match:class = hyprland-run
    move        = 20 monitor_h-120
    float       = true
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Core
bind = $mainMod,       Return, exec,         $terminal
bind = $mainMod,       Q,      killactive
bind = $mainMod,       E,      exec,         $fileManager
bind = $mainMod,       V,      togglefloating
bind = $mainMod,       P,      pseudo
bind = $mainMod,       B,      exec,         $browser
bind = $mainMod,       F,      fullscreen,   0
bind = $mainMod SHIFT, F,      fullscreen,   1
bind = ALT,            Space,  exec,         $menu
bind = $mainMod,       L,      exec,         $lock
bind = $mainMod,       M,      exec,         command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Screenshot (requires grim + slurp)
bind = ,               Print,       exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = SHIFT,          Print,       exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mainMod SHIFT, S,           exec, grim -g "$(slurp)" - | wl-copy

# Clipboard history (requires cliphist + wofi)
bind = $mainMod,       C,      exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, h,     movefocus, l
bind = $mainMod, l,     movefocus, r
bind = $mainMod, k,     movefocus, u
bind = $mainMod, j,     movefocus, d

# Move windows
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d
bind = $mainMod SHIFT, h,     movewindow, l
bind = $mainMod SHIFT, l,     movewindow, r
bind = $mainMod SHIFT, k,     movewindow, u
bind = $mainMod SHIFT, j,     movewindow, d

# Resize
binde = $mainMod CTRL, right, resizeactive,  30 0
binde = $mainMod CTRL, left,  resizeactive, -30 0
binde = $mainMod CTRL, up,    resizeactive,  0 -30
binde = $mainMod CTRL, down,  resizeactive,  0  30

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace,        special:magic

# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media & brightness
bindel = , F2,  exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel = , F3,  exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , F1, 	exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindel = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPause,        exec, playerctl play-pause
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioPrev,         exec, playerctl previous
